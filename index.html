<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оно тебе надо — аукцион вещей, в которые никто не верил</title>
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="./styles/global.css">
    <link rel="stylesheet" href="./styles/style.css">
  </head>

  <body>
    <div class="page">
      <header class="header">
        <div class="header__container">
          
          <nav>
            <ul class="header__links-list">
              <li class="header__links-list-item header__links-list-item_no-bullit">
                <a class="header__link">главная</a>
              </li>
              <li class="header__links-list-item">
                <a class="header__link">посмотреть лоты</a>
              </li>
              <li class="header__links-list-item">
                <a class="header__link">об аукционе</a>
              </li>
            </ul>
          </nav>

          <a class="header__logo ">
            <img class="header__logo-image" src="./images/logo-black.svg" alt="Логотип аукциона">
          </a>

          <address>
            <ul class="address">
              <li class="address__item"><a href="tel:+99995555555" class="address__info">+ 9 999 555 5555</a></li>
              <li class="address__item"><a href="info@sobaka.ge" class="address__info">info@sobaka.ge</a></li>
              <li class="address__item">наб. Принсенграхт 263-265,<br>Амстердам</li>
            </ul>
          </address>
    
        </div>
      </div>
    </header>
    
    <main>
      <section class="cover">
        <div class="overlay">
          <!--aligned-text, aligned-text_center и aligned-text_right — классы для выравнивания строк текста и превращения их в блочный элемент;
letter-spacing-extended — класс для управления межбуквенным расстоянием в местах, где есть эти акценты;
no-letter-spacing — класс для обнуления общего межбуквенного расстояния для последней буквы;-->
        <h1 class="cover__title">
          <span class="aligned-text">он<span class="letter-spacing-extended">о</span></span>
          <span class="aligned-text aligned-text_center">теб<span class="letter-spacing-extended">е</span></span>
          <span class="aligned-text aligned-text_right">н<span class="letter-spacing-extended">ад</span><span class="no-letter-spacing ">о</span></span>
        </h1>





        <div class="cover__description">
        <p class="cover__description-text">Аукцион    вещей,    в    которые    никто    не     верил</p>
        <button class="bet-button">Сделать ставку</button>
      </div></div>
      </section>
    
    
    
      <section class="lots">
        <h2 class="lots__heading">лоты</h2>


        <ul class="lots__card-list">
          <li class="lots__card-list-item">
            <a class="card-link"></a>
          <article class="card card_type_film">
            <h3 class="card__title"></h3>
            <p class="card__text"></pc>
          </article>
        </li>

        <li class="lots__card-list-item">
          <a class="card-link"></a>
        <article class="card card_type_book">
          <h3 class="card__title"></h3>
          <p class="card__text"></pc>
        </article>
      </li>

      <li class="lots__card-list-item">
        <a class="card-link"></a>
      <article class="card card_type_picture">
        <h3 class="card__title"></h3>
        <p class="card__text"></pc>
      </article>
    </li>
        </ul>

        <a class="lots__look-more-link" href="#">посмотреть больше</a>
      </section>



      <section class="about"></section>
    </main>
    <footer class="footer"></footer>
  </div>
</body>
</html>
